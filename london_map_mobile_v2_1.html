<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Londres 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  #loading-overlay {
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:#F7F4ED;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
    transition:opacity .5s;
  }
  #loading-overlay .flag { font-size:48px; }
  #loading-overlay .msg { font-size:16px; color:#1A2433; font-weight:600; }
  #loading-overlay .sub-msg { font-size:13px; color:#6B7686; }
  .spinner {
    width:36px;height:36px;border:3px solid #e0dbd1;
    border-top-color:#B08D57;border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
<style>
  :root{
    --gold:#B08D57;--ink:#1A2433;--muted:#6B7686;--bg:#F7F4ED;--panel:#FFFFFF;
    --c-atracoes:#C0392B;--c-museus:#2E5BA6;--c-comer:#D88A1F;
    --c-compras:#7B4FA0;--c-shows:#1E8C6B;--c-novidades:#C23B86;--c-transporte:#555;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --sheet-peek: 120px; /* how much sheet shows when collapsed */
    --sheet-mid: 45vh;
    --sheet-full: 92vh;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;width:100%;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Arial,sans-serif;
    background:#e8e4dc;
  }

  /* ── MAP ── */
  #map{
    position:fixed;top:0;left:0;right:0;
    bottom:calc(var(--sheet-peek) + var(--safe-bottom));
    z-index:1;
  }

  /* ── TOP BAR ── */
  #topbar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:calc(var(--safe-top) + 10px) 14px 10px;
    background:linear-gradient(to bottom,rgba(255,255,255,.92) 70%,transparent);
    display:flex;align-items:center;gap:10px;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  }
  #topbar h1{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.2px;flex:1;}
  #topbar .sub{font-size:11px;color:var(--muted);display:block;font-weight:400;}

  /* ── FILTER CHIPS (horizontal scroll) ── */
  #chips-wrap{
    position:fixed;top:calc(var(--safe-top) + 62px);left:0;right:0;z-index:9;
    overflow-x:auto;overflow-y:hidden;white-space:nowrap;
    padding:6px 14px 8px;
    scrollbar-width:none;-ms-overflow-style:none;
    -webkit-overflow-scrolling:touch;
  }
  #chips-wrap::-webkit-scrollbar{display:none;}
  .chip{
    display:inline-flex;align-items:center;gap:5px;
    padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;
    color:#fff;cursor:pointer;margin-right:7px;
    border:2px solid transparent;
    transition:opacity .15s,transform .1s;
    -webkit-user-select:none;user-select:none;
    box-shadow:0 1px 4px rgba(0,0,0,.2);
  }
  .chip.off{opacity:.35;filter:grayscale(.5);}
  .chip .chip-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.7);}
  .chip .chip-count{font-size:10px;opacity:.8;}

  /* ── BOTTOM SHEET ── */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    height:var(--sheet-full);
    transform:translateY(calc(var(--sheet-full) - var(--sheet-peek) - var(--safe-bottom)));
    background:var(--panel);
    border-radius:20px 20px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,.18);
    display:flex;flex-direction:column;
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    will-change:transform;
    touch-action:none;
  }
  #sheet.mid{
    transform:translateY(calc(var(--sheet-full) - var(--sheet-mid) - var(--safe-bottom)));
  }
  #sheet.open{
    transform:translateY(0px);
  }

  /* drag handle */
  #handle{
    width:100%;padding:10px 0 6px;display:flex;justify-content:center;
    cursor:grab;flex-shrink:0;
  }
  #handle-bar{width:38px;height:4px;border-radius:3px;background:#D1CCC0;}

  /* sheet header */
  #sheet-header{
    padding:0 16px 10px;flex-shrink:0;border-bottom:1px solid #EDEAD8;
  }
  #sheet-header h2{font-size:15px;font-weight:700;color:var(--ink);}
  #sheet-header p{font-size:11px;color:var(--muted);margin-top:1px;}

  /* base cards */
  #bases{
    display:flex;gap:8px;padding:10px 14px;flex-shrink:0;
    border-bottom:1px solid #EDEAD8;background:#FAFAF6;overflow-x:auto;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  #bases::-webkit-scrollbar{display:none;}
  .base-card{
    flex:0 0 auto;background:#fff;border-radius:12px;padding:10px 13px;
    display:flex;align-items:center;gap:9px;cursor:pointer;
    box-shadow:0 1px 5px rgba(0,0,0,.1);min-width:180px;
    border:1.5px solid #EDE9DA;
  }
  .base-card:active{transform:scale(.97);}
  .base-emoji{font-size:18px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .base-name{font-weight:700;font-size:13px;color:var(--ink);}
  .base-addr{font-size:10.5px;color:var(--muted);line-height:1.3;}

  /* list */
  #sheet-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(30px + var(--safe-bottom));}
  .group-hd{
    font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    padding:14px 16px 5px;display:flex;align-items:center;gap:8px;position:sticky;top:0;
    background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:1;
  }
  .group-hd::after{content:'';flex:1;height:1px;background:#EDEAD8;}
  .place-item{
    display:flex;align-items:flex-start;gap:10px;
    padding:11px 16px;border-bottom:1px solid #F4F1E8;
    cursor:pointer;
    -webkit-user-select:none;user-select:none;
  }
  .place-item:active{background:#F5F2E8;}
  .place-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .place-info{flex:1;min-width:0;}
  .place-name{font-weight:600;font-size:14px;color:var(--ink);margin-bottom:2px;}
  .place-desc{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .place-tag{font-size:10px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;white-space:nowrap;}
  .place-arrow{font-size:16px;color:#CCC;flex-shrink:0;margin-top:2px;}

  /* popup tweaks */
  .leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 16px rgba(0,0,0,.2)!important;}
  .leaflet-popup-content{font-size:13px!important;line-height:1.5!important;max-width:220px!important;margin:12px 14px!important;}
  .leaflet-popup-content b{font-size:14px;display:block;margin:4px 0 2px;}
  .pop-cat{font-size:10px;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff;display:inline-block;}
  .pop-desc{font-size:12px;color:#555;margin-top:4px;}

  /* attribution */
  .leaflet-control-attribution{font-size:9px!important;}
</style>
</head>

// Dismiss loading overlay once first tiles load

function dismissOverlay(){
  if(overlayDismissed) return;
  overlayDismissed = true;
  const ov = document.getElementById('loading-overlay');
  if(ov){ ov.style.opacity='0'; setTimeout(()=>ov.remove(),500); }
}
tileLayer.on('load', dismissOverlay);
// Fallback: dismiss after 4s even if tiles are slow

      .setContent(`<b>${title}</b><br><span style="font-size:12px;color:#888">${sub}</span>`)

  },200);
}

  if(cat==='transporte'){
    return L.divIcon({className:'',
      html:`<div style="width:20px;height:20px;background:${hex};border-radius:4px;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;"><div style="width:7px;height:7px;border-radius:50%;background:#fff;"></div></div>`,
      iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]});
  }
  return L.divIcon({className:'',
    html:`<div style="width:24px;height:24px;border-radius:50% 50% 50% 0;background:${hex};transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);"></div>`,
    iconSize:[24,24],iconAnchor:[12,24],popupAnchor:[0,-24]});
}

const markersByCat={};
const allMarkers=[];
Object.keys(CATS).forEach(c=>markersByCat[c]=[]);

PLACES.forEach(p=>{
  const cat=CATS[p.cat];
  const tagHtml=p.tag?`<span style="font-size:10px;background:${cat.hex};color:#fff;padding:1px 6px;border-radius:4px;margin-left:5px;">${p.tag}</span>`:'';
  const m=L.marker([p.lat,p.lng],{icon:makeMarkerIcon(cat.hex,p.cat)});
  m.bindPopup(`<span class="pop-cat" style="background:${cat.hex}">${cat.label}</span>${tagHtml}<br><b>${p.nome}</b><div class="pop-desc">${p.desc}</div>`);
  m.on('click',()=>{ collapseSheet(); });
  m.addTo(map);
  markersByCat[p.cat].push(m);
  allMarkers.push({marker:m,cat:p.cat,place:p});
});

document.getElementById('count-lbl').textContent=`${PLACES.length} locais · 2 bases`;

// ── CHIPS ──
const activeCats=new Set(Object.keys(CATS));
const chipsWrap=document.getElementById('chips-wrap');
Object.entries(CATS).forEach(([key,cat])=>{
  const count=PLACES.filter(p=>p.cat===key).length;
  const chip=document.createElement('div');
  chip.className='chip';
  chip.dataset.cat=key;
  chip.style.background=cat.hex;
  chip.innerHTML=`<span class="chip-dot"></span>${cat.label}<span class="chip-count">${count}</span>`;
  chip.addEventListener('click',()=>{
    if(activeCats.has(key)){
      activeCats.delete(key);chip.classList.add('off');
      markersByCat[key].forEach(m=>map.removeLayer(m));
    } else {
      activeCats.add(key);chip.classList.remove('off');
      markersByCat[key].forEach(m=>m.addTo(map));
    }
    renderList();
  });
  chipsWrap.appendChild(chip);
});

// ── SHEET DRAG ──
const sheet=document.getElementById('sheet');
let startY=0,startTranslate=0,isDragging=false;
const PEEK=120, sheetH=window.innerHeight*0.92;

function getTranslate(){
  const st=sheet.style.transform;
  const m=st.match(/translateY\(([^p]+)px\)/);
  return m?parseFloat(m[1]):sheetH-PEEK;
}
function setTranslate(y,animated){
  sheet.style.transition=animated?'transform .32s cubic-bezier(.4,0,.2,1)':'none';
  sheet.style.transform=`translateY(${y}px)`;
}
function collapseSheet(){ setTranslate(sheetH-PEEK,true); }
function midSheet(){ setTranslate(sheetH*0.55,true); }
function openSheet(){ setTranslate(0,true); }

const handle=document.getElementById('handle');
handle.addEventListener('touchstart',e=>{
  isDragging=true;
  startY=e.touches[0].clientY;
  startTranslate=getTranslate();
  sheet.style.transition='none';
},{passive:true});
window.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  const dy=e.touches[0].clientY-startY;
  const newY=Math.max(0,Math.min(sheetH-PEEK, startTranslate+dy));
  setTranslate(newY,false);
},{passive:true});
window.addEventListener('touchend',e=>{
  if(!isDragging)return;
  isDragging=false;
  const cur=getTranslate();
  const ratio=cur/sheetH;
  if(ratio<0.2) openSheet();
  else if(ratio<0.65) midSheet();
  else collapseSheet();
});

// tap on map → collapse sheet
map.on('click',()=>collapseSheet());

// ── LIST ──
const listEl=document.getElementById('sheet-list');
function renderList(){
  listEl.innerHTML='';
  Object.keys(CATS).forEach(key=>{
    if(!activeCats.has(key))return;
    const cat=CATS[key];
    const items=PLACES.filter(p=>p.cat===key);
    const hd=document.createElement('div');
    hd.className='group-hd';
    hd.innerHTML=`<span style="color:${cat.hex};font-weight:700;">${cat.label}</span>`;
    listEl.appendChild(hd);
    items.forEach(p=>{
      const el=document.createElement('div');
      el.className='place-item';
      const tagHtml=p.tag?`<span class="place-tag" style="background:${cat.hex}">${p.tag}</span>`:'';
      el.innerHTML=`
        <div class="place-dot" style="background:${cat.hex}"></div>
        <div class="place-info">
          <div class="place-name">${p.nome}${tagHtml}</div>
          <div class="place-desc">${p.desc}</div>
        </div>
        <div class="place-arrow">›</div>`;
      el.addEventListener('click',()=>{
        collapseSheet();
        setTimeout(()=>{
          map.flyTo([p.lat,p.lng],16,{animate:true,duration:.8});
          const found=allMarkers.find(m=>m.place===p);
          if(found)found.marker.openPopup();
        },250);
      });
      listEl.appendChild(el);
    });
  });
}
renderList();

// Fix map size after render
setTimeout(()=>map.invalidateSize(),200);
window.addEventListener('resize',()=>map.invalidateSize());
</script>
</body>
</html>
